name: release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - run: |
          echo "mavenCentralUsername=$OSSRH_USERNAME" >> gradle.properties 
          echo "mavenCentralPassword=$OSSRH_PASSWORD" >> gradle.properties 
          echo "signingInMemoryKey=$SIGNING_KEY" >> gradle.properties 
          echo "signingInMemoryKeyId=$SIGNING_KEY_ID" >> gradle.properties
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}

      - run: ./gradlew publish
