name: pull-request

on:
  pull_request:
    types: [ opened, synchronize ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: &checkout actions/checkout@v6

      - uses: &java actions/setup-java@v5
        with: &java_opts
          java-version: '17'
          distribution: 'temurin'

      - run: ./gradlew check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: *checkout

      - uses: *java
        with: *java_opts

      - run: ./gradlew spotlessCheck

  merge:
    runs-on: ubuntu-latest
    needs:
      - check
      - lint
    permissions:
      pull-requests: write
      issues: write
      repository-projects: write
    if: github.actor == 'dependabot[bot]' && (github.event_name == 'pull_request' && !contains(github.event.pull_request.title, 'SNAPSHOT'))
    steps:
      - uses: *checkout

      - run: gh pr merge --rebase "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.AUTH_TOKEN}}